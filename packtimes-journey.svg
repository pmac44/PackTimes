<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" font-family="'Inter','Helvetica Neue',Arial,sans-serif">
  <!-- ========== DEFS ========== -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>

    <linearGradient id="card1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="100%" stop-color="#fde68a"/>
    </linearGradient>
    <linearGradient id="card2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dcfce7"/>
      <stop offset="100%" stop-color="#bbf7d0"/>
    </linearGradient>
    <linearGradient id="card3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e0e7ff"/>
      <stop offset="100%" stop-color="#c7d2fe"/>
    </linearGradient>
    <linearGradient id="card4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fce7f3"/>
      <stop offset="100%" stop-color="#fbcfe8"/>
    </linearGradient>
    <linearGradient id="card5" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#cffafe"/>
      <stop offset="100%" stop-color="#a5f3fc"/>
    </linearGradient>
    <linearGradient id="card6" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffedd5"/>
      <stop offset="100%" stop-color="#fed7aa"/>
    </linearGradient>

    <filter id="softshadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="3" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.35"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- ========== BACKGROUND ========== -->
  <rect width="1200" height="760" fill="url(#bg)"/>

  <!-- decorative contour lines -->
  <g opacity="0.08" stroke="#94a3b8" stroke-width="1" fill="none">
    <path d="M 0 120 Q 300 60 600 140 T 1200 100"/>
    <path d="M 0 200 Q 300 150 600 230 T 1200 190"/>
    <path d="M 0 280 Q 300 240 600 320 T 1200 280"/>
    <path d="M 0 680 Q 300 620 600 700 T 1200 660"/>
    <path d="M 0 730 Q 300 690 600 740 T 1200 720"/>
  </g>

  <!-- ========== TITLE ========== -->
  <text x="600" y="56" text-anchor="middle" font-size="34" font-weight="700" fill="#f8fafc" letter-spacing="0.5">
    PackTimes — how a ride comes together
  </text>
  <text x="600" y="84" text-anchor="middle" font-size="15" fill="#cbd5e1">
    Load a route, plan the stops, pack the gear — then ride. The app keeps the clock honest the whole way.
  </text>

  <!-- ========== CARDS (2 rows x 3) ========== -->
  <!-- Row 1 y: 130-330  Row 2 y: 400-600 -->

  <!-- Card 1: Load your route -->
  <g transform="translate(60,130)" filter="url(#softshadow)">
    <rect width="340" height="200" rx="18" fill="url(#card1)" stroke="#f59e0b" stroke-width="1.5"/>
    <circle cx="42" cy="42" r="22" fill="#f59e0b"/>
    <text x="42" y="49" text-anchor="middle" font-size="20" font-weight="700" fill="#fff">1</text>
    <text x="80" y="48" font-size="19" font-weight="700" fill="#78350f">Load your route</text>
    <!-- icon: file -->
    <g transform="translate(275,22)" stroke="#b45309" stroke-width="2" fill="none">
      <path d="M 10 4 L 30 4 L 40 14 L 40 44 L 10 44 Z" fill="#fff7ed"/>
      <path d="M 30 4 L 30 14 L 40 14"/>
      <path d="M 16 22 L 34 22 M 16 30 L 34 30 M 16 38 L 28 38"/>
    </g>
    <text x="24" y="92" font-size="14" fill="#78350f">Drop in a GPX, TCX, KML or FIT</text>
    <text x="24" y="112" font-size="14" fill="#78350f">file from your bike computer or</text>
    <text x="24" y="132" font-size="14" fill="#78350f">route planner.</text>
    <text x="24" y="166" font-size="12" font-weight="600" fill="#b45309" letter-spacing="0.5">ROUTES TAB</text>
  </g>

  <!-- Arrow 1→2 -->
  <line x1="400" y1="230" x2="430" y2="230" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Card 2: Plan your stops -->
  <g transform="translate(430,130)" filter="url(#softshadow)">
    <rect width="340" height="200" rx="18" fill="url(#card2)" stroke="#10b981" stroke-width="1.5"/>
    <circle cx="42" cy="42" r="22" fill="#10b981"/>
    <text x="42" y="49" text-anchor="middle" font-size="20" font-weight="700" fill="#fff">2</text>
    <text x="80" y="48" font-size="19" font-weight="700" fill="#064e3b">Plan your stops</text>
    <!-- icon: pin -->
    <g transform="translate(285,20)" stroke="#047857" stroke-width="2" fill="#ecfdf5">
      <path d="M 18 4 C 26 4 32 10 32 18 C 32 28 18 44 18 44 C 18 44 4 28 4 18 C 4 10 10 4 18 4 Z"/>
      <circle cx="18" cy="18" r="5" fill="#047857"/>
    </g>
    <text x="24" y="92" font-size="14" fill="#064e3b">Drop pins for food, water, sleep,</text>
    <text x="24" y="112" font-size="14" fill="#064e3b">fuel and beds. The app checks</text>
    <text x="24" y="132" font-size="14" fill="#064e3b">opening hours against your ETA.</text>
    <text x="24" y="166" font-size="12" font-weight="600" fill="#047857" letter-spacing="0.5">STOPS TAB</text>
  </g>

  <!-- Arrow 2→3 -->
  <line x1="770" y1="230" x2="800" y2="230" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Card 3: Check supplies & gear -->
  <g transform="translate(800,130)" filter="url(#softshadow)">
    <rect width="340" height="200" rx="18" fill="url(#card3)" stroke="#6366f1" stroke-width="1.5"/>
    <circle cx="42" cy="42" r="22" fill="#6366f1"/>
    <text x="42" y="49" text-anchor="middle" font-size="20" font-weight="700" fill="#fff">3</text>
    <text x="80" y="48" font-size="19" font-weight="700" fill="#312e81">Supplies &amp; gear</text>
    <!-- icon: checklist -->
    <g transform="translate(290,18)" stroke="#4338ca" stroke-width="2" fill="none">
      <rect x="4" y="4" width="32" height="40" rx="4" fill="#eef2ff"/>
      <path d="M 10 14 L 14 18 L 22 10" stroke="#4338ca"/>
      <path d="M 10 26 L 14 30 L 22 22" stroke="#4338ca"/>
      <path d="M 26 14 L 32 14 M 26 26 L 32 26 M 10 38 L 32 38"/>
    </g>
    <text x="24" y="92" font-size="14" fill="#312e81">Supplies tab covers food and</text>
    <text x="24" y="112" font-size="14" fill="#312e81">water between stops. Gear list</text>
    <text x="24" y="132" font-size="14" fill="#312e81">catches what you'd forget.</text>
    <text x="24" y="166" font-size="12" font-weight="600" fill="#4338ca" letter-spacing="0.5">SUPPLIES TAB</text>
  </g>

  <!-- Curved arrow 3 → 4 (down and back to left column) -->
  <path d="M 970 330 Q 970 380 220 380 L 220 400"
        stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#arrow)" stroke-dasharray="0"/>

  <!-- Card 4: Mission brief -->
  <g transform="translate(60,400)" filter="url(#softshadow)">
    <rect width="340" height="200" rx="18" fill="url(#card4)" stroke="#ec4899" stroke-width="1.5"/>
    <circle cx="42" cy="42" r="22" fill="#ec4899"/>
    <text x="42" y="49" text-anchor="middle" font-size="20" font-weight="700" fill="#fff">4</text>
    <text x="80" y="48" font-size="19" font-weight="700" fill="#831843">Mission brief</text>
    <!-- icon: clipboard + sun -->
    <g transform="translate(290,18)" stroke="#be185d" stroke-width="2" fill="none">
      <rect x="6" y="6" width="28" height="38" rx="3" fill="#fff0f6"/>
      <rect x="12" y="2" width="16" height="8" rx="2" fill="#fbcfe8"/>
      <path d="M 12 20 L 28 20 M 12 28 L 28 28 M 12 36 L 22 36"/>
    </g>
    <text x="24" y="92" font-size="14" fill="#831843">ETAs at every stop, weather and</text>
    <text x="24" y="112" font-size="14" fill="#831843">daylight along the way, plus a</text>
    <text x="24" y="132" font-size="14" fill="#831843">printable ride sheet.</text>
    <text x="24" y="166" font-size="12" font-weight="600" fill="#be185d" letter-spacing="0.5">MISSION TAB</text>
  </g>

  <!-- Arrow 4→5 -->
  <line x1="400" y1="500" x2="430" y2="500" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Card 5: Ride -->
  <g transform="translate(430,400)" filter="url(#softshadow)">
    <rect width="340" height="200" rx="18" fill="url(#card5)" stroke="#06b6d4" stroke-width="1.5"/>
    <circle cx="42" cy="42" r="22" fill="#06b6d4"/>
    <text x="42" y="49" text-anchor="middle" font-size="20" font-weight="700" fill="#fff">5</text>
    <text x="80" y="48" font-size="19" font-weight="700" fill="#164e63">Ride — GPS on</text>
    <!-- icon: bike -->
    <g transform="translate(275,22)" stroke="#0e7490" stroke-width="2" fill="none">
      <circle cx="12" cy="32" r="8"/>
      <circle cx="36" cy="32" r="8"/>
      <path d="M 12 32 L 22 16 L 32 32 M 22 16 L 28 16 M 16 32 L 24 12"/>
    </g>
    <text x="24" y="92" font-size="14" fill="#164e63">Live map, turn beeps before each</text>
    <text x="24" y="112" font-size="14" fill="#164e63">corner, and an off-route alert if</text>
    <text x="24" y="132" font-size="14" fill="#164e63">you drift from the line.</text>
    <text x="24" y="166" font-size="12" font-weight="600" fill="#0e7490" letter-spacing="0.5">RIDE TAB</text>
  </g>

  <!-- Arrow 5→6 -->
  <line x1="770" y1="500" x2="800" y2="500" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Card 6: Adaptive pace -->
  <g transform="translate(800,400)" filter="url(#softshadow)">
    <rect width="340" height="200" rx="18" fill="url(#card6)" stroke="#f97316" stroke-width="1.5"/>
    <circle cx="42" cy="42" r="22" fill="#f97316"/>
    <text x="42" y="49" text-anchor="middle" font-size="20" font-weight="700" fill="#fff">6</text>
    <text x="80" y="48" font-size="19" font-weight="700" fill="#7c2d12">Pace adapts</text>
    <!-- icon: gauge -->
    <g transform="translate(290,20)" stroke="#c2410c" stroke-width="2" fill="none">
      <path d="M 6 32 A 16 16 0 0 1 38 32" fill="#ffedd5"/>
      <line x1="22" y1="32" x2="30" y2="18"/>
      <circle cx="22" cy="32" r="2.5" fill="#c2410c"/>
    </g>
    <text x="24" y="92" font-size="14" fill="#7c2d12">The app watches your real speed</text>
    <text x="24" y="112" font-size="14" fill="#7c2d12">and quietly updates every ETA</text>
    <text x="24" y="132" font-size="14" fill="#7c2d12">ahead. No fiddling needed.</text>
    <text x="24" y="166" font-size="12" font-weight="600" fill="#c2410c" letter-spacing="0.5">AUTOMATIC</text>
  </g>

  <!-- Loop arrow: 6 back to 5 (adaptive pace feeds the ride) -->
  <path d="M 970 600 Q 970 660 600 660 L 600 605"
        stroke="#f97316" stroke-width="1.5" fill="none" marker-end="url(#arrow)" stroke-dasharray="4 4" opacity="0.8"/>
  <text x="780" y="685" font-size="12" fill="#fdba74" font-style="italic">feeds back into your live ETAs</text>

  <!-- ========== FOOTER ========== -->
  <text x="600" y="735" text-anchor="middle" font-size="12" fill="#64748b">
    Works offline once installed · Syncs your plan via Dropbox (optional) · Weather from Open-Meteo · Free and open
  </text>
</svg>
